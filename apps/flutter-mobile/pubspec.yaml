name: amberkitchen_flutter
description: Production Flutter customer app for AmberKitchen food ordering, checkout, and live tracking.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  firebase_messaging: ^15.1.6
  flutter_secure_storage: ^9.2.2
  geolocator: ^13.0.2
  google_maps_flutter: ^2.10.0
  http: ^1.2.2
  url_launcher: ^6.3.1
  google_sign_in: ^7.2.0
  socket_io_client: ^3.1.4
  firebase_core: ^3.15.2
  app_links: ^7.0.0
  provider: ^6.1.5+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
