name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  backend-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      - name: Install dependencies
        run: cd backend && npm ci
      - name: Run migrations
        run: cd backend && npm run migrate
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/postgres
      - name: Run seed
        run: cd backend && npm run seed
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/postgres
      - name: Run tests
        run: cd backend && npm run test:smoke
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/postgres
          JWT_SECRET: test-jwt-secret
          GOOGLE_PLACES_API_KEY: test-key
          PAYTM_MERCHANT_ID: test-merchant
          PAYTM_MERCHANT_KEY: test-key
          PHONEPE_MERCHANT_ID: test-merchant
          PHONEPE_SALT_KEY: test-key
          RAZORPAY_KEY_ID: test-key
          RAZORPAY_KEY_SECRET: test-key

  flutter-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
      - name: Install dependencies
        run: cd apps/flutter-mobile && flutter pub get
      - name: Run tests
        run: cd apps/flutter-mobile && flutter test

  react-native-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/mobile-react/package-lock.json
      - name: Install dependencies
        run: cd apps/mobile-react && npm ci
      - name: Run tests
        run: cd apps/mobile-react && npm test -- --watchAll=false