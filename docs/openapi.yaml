openapi: 3.0.3
info:
  title: AmberKitchen API
  version: 1.0.0
  description: Launch baseline API contract for the Azure-hosted food delivery platform.
servers:
  - url: https://api.example.com/api/v1
    description: Production
  - url: http://localhost:4000/api/v1
    description: Local development
paths:
  /auth/otp/request:
    post:
      summary: Request OTP login code.
      responses:
        "200":
          description: OTP request accepted.
  /auth/otp/verify:
    post:
      summary: Verify OTP and return a session token.
      responses:
        "200":
          description: Authenticated session.
  /auth/google:
    post:
      summary: Login or signup with Google ID token.
      responses:
        "200":
          description: Authenticated session.
  /restaurants:
    get:
      summary: Search restaurants with cuisine, veg, rating, distance, and price filters.
      responses:
        "200":
          description: Restaurant list.
  /restaurants/onboarding:
    post:
      summary: Submit restaurant onboarding details.
      security:
        - bearerAuth: []
      responses:
        "201":
          description: Onboarding submitted.
  /orders:
    post:
      summary: Place an order.
      description: Supports the Idempotency-Key header for safe client retries.
      security:
        - bearerAuth: []
      parameters:
        - in: header
          name: Idempotency-Key
          schema:
            type: string
      responses:
        "201":
          description: Order created.
        "409":
          description: Idempotency key conflict.
    get:
      summary: List orders visible to the signed-in user.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Order list.
  /orders/{id}:
    get:
      summary: Get order detail, items, and status history.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/OrderId"
      responses:
        "200":
          description: Order detail.
    patch:
      summary: Edit an order before restaurant confirmation.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/OrderId"
      responses:
        "200":
          description: Order updated.
  /payments/create:
    post:
      summary: Create Paytm, PhonePe, or Razorpay payment.
      security:
        - bearerAuth: []
      responses:
        "201":
          description: Payment created.
  /payments/orders/{id}/status:
    get:
      summary: Get customer payment and refund status for an order.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/OrderId"
      responses:
        "200":
          description: Payment and refund status returned.
  /payments/paytm/callback:
    post:
      summary: Paytm payment webhook.
      responses:
        "200":
          description: Webhook accepted.
  /payments/phonepe/callback:
    post:
      summary: PhonePe payment webhook with signature verification and replay protection.
      responses:
        "200":
          description: Webhook accepted.
  /payments/razorpay/callback:
    post:
      summary: Razorpay payment webhook with signature verification and replay protection.
      responses:
        "200":
          description: Webhook accepted.
  /tracking/orders/{id}/location:
    post:
      summary: Send live driver location for an order.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/OrderId"
      responses:
        "200":
          description: Location accepted.
  /admin/analytics:
    get:
      summary: Platform analytics for admin dashboards.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Analytics data.
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    OrderId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
